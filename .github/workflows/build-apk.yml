name: Build Android APK Final Pro

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Save APK into repository
        run: |
          mkdir -p apk-output
          cp app/build/outputs/apk/debug/app-debug.apk apk-output/FamilyLocation-final-pro.apk
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add apk-output/FamilyLocation-final-pro.apk
          git commit -m "add built apk [skip ci]" || echo "No APK changes to commit"
          git push
